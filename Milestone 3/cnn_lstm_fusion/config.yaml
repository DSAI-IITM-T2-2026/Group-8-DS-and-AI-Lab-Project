# CNN + LSTM (+ optional S5P) — Milestone 3 fusion model
# Home: Milestone 3/cnn_lstm_fusion (separate from cnn_s2_mvp)

task:
  history_days: 7
  lead_days: 1
  firms_confidence_min: 30

temporal:
  start_date: "2022-05-01"
  end_date: "2025-11-30"
  fire_season_months: [5, 6, 7, 8, 9, 10, 11]

# Train 2 years; val/test 1 year each
split:
  train_years: [2022, 2023]
  val_year: 2024
  test_year: 2025
  train_end: "2023-12-31"
  val_end: "2024-12-31"

sampling:
  neg_pos_ratio: 4.0
  random_seed: 42
  max_train: 25000
  max_val: 8000
  max_test: 8000
  hard_negative: true

patch:
  size: 64
  bands: 6
  gcs_prefix: "gs://dsai-lab-project/wildfire_satellite/raw/sentinel2"
  vsigs_prefix: "/vsigs/dsai-lab-project/wildfire_satellite/raw/sentinel2"

paths:
  mvp_output_dir: "../mvp_era5_dem/outputs"
  california_geojson: "data/california.geojson"
  output_dir: "outputs"
  patches_dir: "outputs/patches"
  sequences_dir: "outputs/sequences"
  tiles_dir: "outputs/s2_tiles"
  s5p_tiles_dir: "outputs/s5p_tiles"
  manifest: "outputs/manifest.parquet"

sources:
  sentinel2: true
  era5_dem: true
  sentinel5p:
    enabled: false
    gcs_prefix: "gs://dsai-lab-project/wildfire_satellite/raw/sentinel5p"
    vsigs_prefix: "/vsigs/dsai-lab-project/wildfire_satellite/raw/sentinel5p"

model:
  cnn_embed_dim: 128
  lstm_embed_dim: 64
  s5p_embed_dim: 32
  lstm_hidden: 64
  dropout: 0.2
  epochs: 15
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 0
  random_seed: 42

alerts:
  top_k: 25
