# ERA5 Wildfire Data Pipeline Configuration

dataset: reanalysis-era5-single-levels
product_type: reanalysis

years:
  start: 2016
  end: 2025

area:
  north: 42.01
  south: 32.53
  west: -124.41
  east: -114.13

variables:
  - 2m_temperature
  - 2m_dewpoint_temperature
  - surface_pressure
  - 10m_u_component_of_wind
  - 10m_v_component_of_wind
  - instantaneous_10m_wind_gust
  - total_precipitation
  - volumetric_soil_water_layer_1
  - volumetric_soil_water_layer_2
  - high_vegetation_cover
  - low_vegetation_cover
  - leaf_area_index_high_vegetation
  - leaf_area_index_low_vegetation
  - boundary_layer_height

times:
  - "00:00"
  - "01:00"
  - "02:00"
  - "03:00"
  - "04:00"
  - "05:00"
  - "06:00"
  - "07:00"
  - "08:00"
  - "09:00"
  - "10:00"
  - "11:00"
  - "12:00"
  - "13:00"
  - "14:00"
  - "15:00"
  - "16:00"
  - "17:00"
  - "18:00"
  - "19:00"
  - "20:00"
  - "21:00"
  - "22:00"
  - "23:00"

download:
  year_order: descending  # descending (2025→2016) or ascending (2016→2025)

  # One CDS account per entry — each account gets its own queue slot.
  # Option A: home directory files
  #   ~/.cdsapirc, ~/.cdsapirc_alt, ~/.cdsapirc_alt2
  # Option B: project credentials/ folder (gitignored)
  #   cp credentials/account.example credentials/account2.cdsapirc
  cds_accounts:
    - name: primary
      rc_file: ~/.cdsapirc
    - name: secondary
      rc_file: credentials/account2.cdsapirc
    - name: tertiary
      rc_file: credentials/account3.cdsapirc

  max_workers_per_account: 1   # 3 accounts × 1 = 3 parallel downloads
  partition_strategy: round_robin  # round_robin | year_modulo
  account_stagger_seconds: 30    # stagger account startup to avoid burst
  max_retries: 8
  queue_limit_max_retries: 30
  retry_base_delay: 60
  queue_limit_delay: 600
  startup_delay_seconds: 60
  request_delay_seconds: 15
  data_format: netcdf
  download_format: unarchived

paths:
  output_root: outputs
  raw: outputs/raw
  merged: outputs/merged
  processed: outputs/processed
  metadata: outputs/metadata
  reports: outputs/reports
  logs: outputs/logs
  plots: outputs/reports/plots

processing:
  rainfall_aggregation_hours: 24
  compression: zlib
  complevel: 4

upload:
  destination: gcs
  gcs_bucket: dsai-lab-project
  gcs_project: iitm-dsai-lab
  gcs_prefix: wildfire_satellite
  dataset_subdir: era5/raw
  years:
    start: 2021
    end: 2025
  staging_dir: uploads/gcs_staging
  skip_existing: true
