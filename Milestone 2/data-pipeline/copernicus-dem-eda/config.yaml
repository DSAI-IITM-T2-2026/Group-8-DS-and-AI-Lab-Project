# EDA Configuration — California DEM analysis + ERA5 fusion planning

paths:
  terrain_dir: "DEM/terrain"  # or download from gs://.../dem/2021-2025/california/terrain/
  boundary: "boundaries/california.geojson"
  output_dir: "outputs"
  # Clipped CA GeoTIFFs are published to GCS (not committed):
  # gs://dsai-lab-project/wildfire_satellite/dem/2021-2025/california/eda/clipped_ca/

gcs:
  bucket: "dsai-lab-project"
  project: "iitm-dsai-lab"
  clipped_ca_uri: "gs://dsai-lab-project/wildfire_satellite/dem/2021-2025/california/eda/clipped_ca/"

clip:
  # Downsample for practical EDA (1 = full 30 m; 10 ≈ 300 m)
  downsample_factor: 10
  nodata: -32768.0

extraction:
  max_sample_pixels: 500000
  random_seed: 42
  layers:
    - elevation
    - slope
    - aspect
    - hillshade
    - tri
    - tpi

era5:
  resolution_deg: 0.25
  year_range: "2021-2025"
  # Your ERA5 features — static DEM will be joined to these as time-invariant covariates
  variables:
    - 2m_temperature
    - 2m_dewpoint_temperature
    - surface_pressure
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - instantaneous_10m_wind_gust
    - total_precipitation
    - volumetric_soil_water_layer_1
    - volumetric_soil_water_layer_2
    - high_vegetation_cover
    - low_vegetation_cover
    - leaf_area_index_high_vegetation
    - leaf_area_index_low_vegetation
    - boundary_layer_height
